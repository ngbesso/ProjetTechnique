name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: obnl
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: obnl_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U obnl"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .
      - name: Tests (pytest)
        working-directory: backend
        env:
          # L'app (seed au démarrage) et les tests pointent tous deux sur la base du service CI
          DATABASE_URL: postgresql+psycopg://obnl:changeme@localhost:5432/obnl_test
          TEST_DATABASE_URL: postgresql+psycopg://obnl:changeme@localhost:5432/obnl_test
        run: pytest -q

  ai-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        working-directory: ai-service
        run: pip install -r requirements.txt
      - name: Lint (ruff)
        working-directory: ai-service
        run: ruff check .

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        working-directory: frontend
        run: npm install
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Build
        working-directory: frontend
        run: npm run build
